<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easy Rent Bill</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Material+Symbols+Outlined:FILL@0..1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f7ff;
      --panel: #ffffff;
      --panel-soft: #eef2ff;
      --panel-line: #d9e0f1;
      --text: #161c2f;
      --muted: #65708b;
      --primary: #1d57d8;
      --primary-strong: #0f43b5;
      --green: #72ef95;
      --green-text: #0e6d33;
      --red-soft: #ffe5e1;
      --red: #d82727;
      --orange: #c28111;
      --gray-chip: #ebedf4;
      --shadow: 0 10px 30px rgba(19, 43, 98, 0.08);
      --radius: 22px;
      --radius-sm: 16px;
      --sidebar: 280px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(29, 87, 216, 0.08), transparent 25%),
        linear-gradient(180deg, #fafbff 0%, #f2f5ff 100%);
      color: var(--text);
      font-family: "Be Vietnam Pro", sans-serif;
    }

    body {
      padding-bottom: 88px;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .material-symbols-outlined {
      font-variation-settings: "FILL" 0;
      vertical-align: middle;
    }

    .app-shell {
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 20px;
      background: rgba(250, 251, 255, 0.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(217, 224, 241, 0.85);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--primary);
    }

    .brand-badge {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2f74ff, #0d46bf);
      color: #fff;
      box-shadow: var(--shadow);
    }

    .shell-body {
      display: block;
      max-width: 1380px;
      margin: 0 auto;
      padding: 20px;
    }

    .sidebar {
      display: none;
    }

    .main {
      min-width: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .page-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 20px;
    }

    .page-title {
      margin: 0;
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      line-height: 1.1;
      font-weight: 800;
    }

    .subtle {
      color: var(--muted);
      margin-top: 8px;
      font-size: 0.97rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      min-height: 48px;
      padding: 12px 18px;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.15s ease, background 0.2s ease, color 0.2s ease, opacity 0.2s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-strong));
      color: #fff;
      box-shadow: 0 10px 24px rgba(29, 87, 216, 0.26);
    }

    .btn-secondary {
      background: var(--panel-soft);
      color: var(--primary);
      border: 1px solid var(--panel-line);
    }

    .btn-outline {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--panel-line);
    }

    .btn-danger {
      background: var(--red);
      color: #fff;
    }

    .btn-ghost {
      background: transparent;
      color: var(--primary);
    }

    .stats-grid,
    .quick-grid,
    .cards-grid,
    .settings-grid,
    .room-grid,
    .invoice-grid {
      display: grid;
      gap: 16px;
    }

    .stats-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-bottom: 20px;
    }

    .stat-card {
      padding: 18px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: clamp(1.7rem, 5vw, 2.8rem);
      font-weight: 800;
      line-height: 1;
      margin-bottom: 8px;
    }

    .stat-foot {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .quick-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-bottom: 20px;
    }

    .quick-card {
      padding: 18px;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .quick-card.primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-strong));
      color: #fff;
    }

    .quick-card .icon {
      font-size: 1.7rem;
    }

    .quick-card .title {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .split {
      display: grid;
      gap: 16px;
      margin-bottom: 20px;
    }

    .panel-block {
      padding: 18px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .panel-title h3 {
      margin: 0;
      font-size: 1.15rem;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .list-item {
      border: 1px solid var(--panel-line);
      border-radius: 18px;
      padding: 16px;
      background: #fff;
    }

    .chip-row,
    .filter-row,
    .segmented,
    .room-switcher {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chip,
    .segment-btn,
    .room-pill {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--panel-line);
      background: #fff;
      color: var(--muted);
    }

    .chip.active,
    .segment-btn.active,
    .room-pill.active {
      background: var(--green);
      color: #0c3f21;
      border-color: transparent;
      font-weight: 700;
    }

    .room-pill.current {
      background: var(--primary);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 8px 18px rgba(29, 87, 216, 0.24);
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    .form-grid.cols-2 {
      grid-template-columns: repeat(1, minmax(0, 1fr));
    }

    label.field {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border-radius: 16px;
      border: 1px solid var(--panel-line);
      background: #fff;
      color: var(--text);
      padding: 14px 16px;
      outline: none;
      min-height: 52px;
    }

    .field textarea {
      min-height: 108px;
      resize: vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(29, 87, 216, 0.12);
    }

    .helper {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--panel-line);
      border-radius: 18px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 820px;
    }

    th, td {
      text-align: left;
      padding: 14px 16px;
      border-bottom: 1px solid #edf1fa;
      vertical-align: top;
    }

    th {
      font-size: 0.85rem;
      color: var(--muted);
      background: #f9fbff;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      background: var(--gray-chip);
      color: #47506a;
    }

    .badge.occupied,
    .badge.paid {
      background: rgba(114, 239, 149, 0.22);
      color: var(--green-text);
    }

    .badge.vacant {
      background: #eef1f7;
      color: #5d6478;
    }

    .badge.maintenance {
      background: rgba(194, 129, 17, 0.16);
      color: #8a5a09;
    }

    .badge.disabled,
    .badge.cancelled {
      background: #d7dbe7;
      color: #47506a;
    }

    .badge.unpaid {
      background: var(--red-soft);
      color: var(--red);
    }

    .money {
      font-weight: 800;
    }

    .danger-box,
    .success-box,
    .info-box {
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 0.92rem;
    }

    .danger-box {
      background: #fff3f2;
      border: 1px solid #ffd1cb;
      color: var(--red);
    }

    .success-box {
      background: #ecfff1;
      border: 1px solid #b9efc6;
      color: var(--green-text);
    }

    .info-box {
      background: #f1f6ff;
      border: 1px solid #cfddfb;
      color: var(--primary-strong);
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #e5eaf8;
      overflow: hidden;
    }

    .progress-bar > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #1d57d8, #6aa4ff);
      border-radius: inherit;
    }

    .metric-card {
      padding: 22px;
    }

    .metric-row {
      display: grid;
      gap: 16px;
      margin-top: 18px;
    }

    .meter-box {
      border: 1px solid var(--panel-line);
      border-radius: 22px;
      padding: 18px;
      background: #fff;
    }

    .meter-value {
      min-height: 86px;
      font-size: clamp(2.1rem, 8vw, 4rem);
      text-align: center;
      font-weight: 800;
    }

    .meter-value.invalid {
      border-color: var(--red);
      color: var(--red);
      background: #fff8f7;
    }

    .footer-nav {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 50;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(217, 224, 241, 0.95);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .nav-btn {
      min-height: 62px;
      border-radius: 18px;
      background: transparent;
      color: var(--muted);
      display: grid;
      place-items: center;
      gap: 4px;
      font-size: 0.76rem;
      padding: 6px;
    }

    .nav-btn.active {
      background: var(--green);
      color: #16381f;
      font-weight: 700;
    }

    .nav-btn .material-symbols-outlined {
      font-size: 1.5rem;
    }

    .empty-state {
      padding: 28px 18px;
      text-align: center;
      color: var(--muted);
    }

    .fab {
      position: fixed;
      right: 20px;
      bottom: 106px;
      z-index: 35;
      width: 64px;
      height: 64px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--primary), var(--primary-strong));
      color: #fff;
      box-shadow: 0 14px 26px rgba(29, 87, 216, 0.32);
      display: inline-grid;
      place-items: center;
    }

    .modal-root {
      position: fixed;
      inset: 0;
      z-index: 80;
      pointer-events: none;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(10, 18, 34, 0.52);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .modal-card {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -48%);
      width: min(720px, calc(100vw - 24px));
      max-height: calc(100vh - 40px);
      overflow: auto;
      background: #fff;
      border-radius: 28px;
      border: 1px solid var(--panel-line);
      box-shadow: 0 18px 46px rgba(14, 32, 66, 0.2);
      padding: 20px;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .modal-root.active {
      pointer-events: auto;
    }

    .modal-root.active .modal-backdrop,
    .modal-root.active .modal-card {
      opacity: 1;
    }

    .modal-root.active .modal-card {
      transform: translate(-50%, -50%);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 18px;
    }

    .modal-title {
      margin: 0;
      font-size: 1.35rem;
    }

    .close-btn {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      background: var(--panel-soft);
      color: var(--primary);
      display: grid;
      place-items: center;
    }

    .toast-root {
      position: fixed;
      right: 16px;
      top: 16px;
      z-index: 90;
      display: grid;
      gap: 10px;
    }

    .toast {
      min-width: 280px;
      max-width: min(420px, calc(100vw - 32px));
      padding: 14px 16px;
      border-radius: 18px;
      color: #fff;
      box-shadow: 0 14px 30px rgba(11, 18, 32, 0.18);
      animation: slide-in 0.22s ease;
    }

    .toast.success { background: #1c9950; }
    .toast.error { background: #d82727; }
    .toast.info { background: #1d57d8; }

    @keyframes slide-in {
      from { transform: translateY(-8px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .loader {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
    }

    .loader::before {
      content: "";
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(29, 87, 216, 0.2);
      border-top-color: var(--primary);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .login-screen {
      position: fixed;
      inset: 0;
      z-index: 95;
      background:
        radial-gradient(circle at top left, rgba(114, 239, 149, 0.18), transparent 30%),
        linear-gradient(180deg, #eef4ff 0%, #f7f9ff 100%);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .login-card {
      width: min(460px, 100%);
      padding: 28px;
    }

    .login-logo {
      width: 70px;
      height: 70px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--primary), var(--primary-strong));
      color: #fff;
      font-size: 2rem;
      margin-bottom: 18px;
      box-shadow: 0 16px 30px rgba(29, 87, 216, 0.24);
    }

    .kv {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px dashed #e5eaf6;
    }

    .slip-preview {
      width: 100%;
      max-height: 280px;
      object-fit: contain;
      border-radius: 20px;
      border: 1px solid var(--panel-line);
      background: #f7f9ff;
    }

    .sticky-actions {
      position: sticky;
      bottom: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,0.92) 24%, rgba(255,255,255,1) 100%);
      padding-top: 18px;
      margin-top: 18px;
    }

    @media (min-width: 820px) {
      body {
        padding-bottom: 0;
      }

      .shell-body {
        display: grid;
        grid-template-columns: var(--sidebar) minmax(0, 1fr);
        gap: 24px;
      }

      .sidebar {
        display: block;
        position: sticky;
        top: 88px;
        align-self: start;
      }

      .sidebar .panel {
        padding: 18px;
      }

      .side-nav {
        display: grid;
        gap: 8px;
      }

      .side-btn {
        min-height: 54px;
        padding: 12px 14px;
        border-radius: 18px;
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--muted);
        background: transparent;
      }

      .side-btn.active {
        background: var(--green);
        color: #16381f;
        font-weight: 700;
      }

      .footer-nav,
      .fab.mobile-only {
        display: none;
      }

      .stats-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .quick-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .split {
        grid-template-columns: 1.2fr 1fr;
      }

      .cards-grid,
      .invoice-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .settings-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .room-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .form-grid.cols-2,
      .metric-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div id="loginRoot"></div>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-badge">
          <span class="material-symbols-outlined">apartment</span>
        </div>
        <div>
          <div>Easy Rent Bill</div>
          <div id="headerMode" class="helper">โหมดตัวอย่าง</div>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-secondary" id="headerMonthBtn" type="button"></button>
        <button class="btn btn-outline" id="headerRefreshBtn" type="button">
          <span class="material-symbols-outlined">refresh</span>
          รีเฟรช
        </button>
      </div>
    </header>

    <div class="shell-body">
      <aside class="sidebar">
        <div class="panel">
          <div class="subtle" style="margin-top:0; margin-bottom:12px;">เมนูหลัก</div>
          <nav class="side-nav" id="sideNav"></nav>
          <div class="info-box" style="margin-top:16px;">
            วาง Apps Script URL ที่หน้า "ตั้งค่า" ได้ที่ช่อง
            <strong>** วาง APP URL ตรงนี้ **</strong>
          </div>
        </div>
      </aside>

      <main class="main" id="pageRoot"></main>
    </div>
  </div>

  <button id="fabButton" class="fab mobile-only" type="button" hidden>
    <span class="material-symbols-outlined">add</span>
  </button>

  <nav class="footer-nav" id="bottomNav"></nav>

  <div id="modalRoot" class="modal-root"></div>
  <div id="toastRoot" class="toast-root"></div>

  <script>
    const APP_URL_PLACEHOLDER = "** วาง APP URL ตรงนี้ **";
    const DEFAULT_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzvVeazqlo-xx5jgqgvAaRyoWWzXe7pWcpJq4HvQfM4eIAoLzZhlPhWYCGKlVrg1Ll2/exec";
    const LEGACY_SCRIPT_URLS = new Set([
      "https://script.google.com/macros/s/AKfycbwK540n1az6p4SABtMdCadf5dTdl5vtBTe3ahwWSZfQmppkpTVvHRgiLHFNDCYuyqtm/exec",
      "https://script.google.com/macros/s/AKfycbz9IXA9xl6HmtaHCT7anp-tIni8RcP2556iF6DyeFkDBxwzg5y9s7xTF5_2Eo-pyVRH/exec",
      "https://script.google.com/macros/s/AKfycbwe_HJ4sr53rApoJnySiSMz3REt4f3ocrr4fIz_h5OfMQClsXqLehZ6iaP8QQeQ4WTo/exec",
      "https://script.google.com/macros/s/AKfycbyPSr2jP2dGQY4aux5SVoXDHIh5zvTogSDlDDaEhFa_P1HX5rZseHNAzBi6YRymOPPV/exec"
    ]);
    const STORAGE_KEYS = {
      page: "ERB_ACTIVE_PAGE",
      scriptUrl: "ERB_SCRIPT_URL",
      auth: "ERB_AUTH"
    };
    const storedScriptUrl = localStorage.getItem(STORAGE_KEYS.scriptUrl);
    const initialScriptUrl = !storedScriptUrl || storedScriptUrl === APP_URL_PLACEHOLDER || LEGACY_SCRIPT_URLS.has(storedScriptUrl)
      ? DEFAULT_SCRIPT_URL
      : storedScriptUrl;

    const PAGE_META = [
      { id: "dashboard", label: "หน้าหลัก", icon: "grid_view" },
      { id: "rooms", label: "ห้องพัก", icon: "home_work" },
      { id: "meters", label: "จดมิเตอร์", icon: "speed" },
      { id: "invoices", label: "ใบแจ้งหนี้", icon: "receipt_long" },
      { id: "settings", label: "ตั้งค่า", icon: "settings" }
    ];

    const state = {
      page: localStorage.getItem(STORAGE_KEYS.page) || "dashboard",
      scriptUrl: initialScriptUrl,
      auth: readJson(STORAGE_KEYS.auth, null),
      loading: false,
      settings: {},
      summary: {},
      logs: [],
      rooms: { items: [], total: 0, page: 1, pageSize: 20, query: "", status: "all" },
      roomDetail: null,
      invoices: { items: [], total: 0, page: 1, pageSize: 20, month: currentMonth(), status: "all", query: "" },
      meter: {
        month: currentMonth(),
        mode: "all",
        roomId: "",
        rooms: [],
        previous: null,
        progress: { done: 0, total: 0, percent: 0 }
      }
    };

    const mockDb = createMockDatabase();

    document.addEventListener("DOMContentLoaded", boot);

    async function boot() {
      bindGlobalEvents();
      renderShell();
      await ensureLogin();
      await loadPage(state.page);
    }

    function bindGlobalEvents() {
      window.addEventListener("hashchange", () => {
        const hash = location.hash.replace("#/", "");
        if (PAGE_META.some((page) => page.id === hash)) {
          state.page = hash;
          localStorage.setItem(STORAGE_KEYS.page, hash);
          renderShell();
          loadPage(hash);
        }
      });

      document.getElementById("headerRefreshBtn").addEventListener("click", () => loadPage(state.page, true));
      document.getElementById("headerMonthBtn").addEventListener("click", () => {
        if (state.page === "meters") {
          changeMonth("meter");
        } else if (state.page === "invoices") {
          changeMonth("invoice");
        } else {
          openMonthQuickJump();
        }
      });

      document.getElementById("fabButton").addEventListener("click", () => {
        if (state.page === "rooms") {
          openRoomModal();
        } else if (state.page === "invoices") {
          handleGenerateInvoices();
        } else if (state.page === "meters") {
          saveMeter(true);
        }
      });
    }

    function renderShell() {
      const activePage = PAGE_META.find((item) => item.id === state.page) || PAGE_META[0];
      location.hash = "#/" + activePage.id;
      document.getElementById("sideNav").innerHTML = PAGE_META.map((item) => `
        <button class="side-btn ${item.id === activePage.id ? "active" : ""}" type="button" onclick="goPage('${item.id}')">
          <span class="material-symbols-outlined">${item.icon}</span>
          <span>${item.label}</span>
        </button>
      `).join("");
      document.getElementById("bottomNav").innerHTML = PAGE_META.map((item) => `
        <button class="nav-btn ${item.id === activePage.id ? "active" : ""}" type="button" onclick="goPage('${item.id}')">
          <span class="material-symbols-outlined">${item.icon}</span>
          <span>${item.label}</span>
        </button>
      `).join("");
      document.getElementById("headerMode").textContent = isMockMode()
        ? "โหมดตัวอย่าง - ยังไม่เชื่อม Apps Script"
        : "เชื่อม Google Sheets แล้ว";
      document.getElementById("headerMonthBtn").innerHTML = `
        <span class="material-symbols-outlined">calendar_month</span>
        ${formatThaiMonth(state.page === "meters" ? state.meter.month : state.invoices.month)}
      `;

      const fab = document.getElementById("fabButton");
      fab.hidden = !["rooms", "meters", "invoices"].includes(state.page);
      fab.innerHTML = state.page === "rooms"
        ? '<span class="material-symbols-outlined">add</span>'
        : state.page === "invoices"
          ? '<span class="material-symbols-outlined">autorenew</span>'
          : '<span class="material-symbols-outlined">save</span>';
    }

    async function ensureLogin() {
      if (!state.auth) {
        renderLogin();
        return new Promise((resolve) => {
          window.__loginResolved = resolve;
        });
      }
      try {
        await api("LOGIN", { username: state.auth.username, password: state.auth.password }, { silent: true, anonymous: true });
      } catch (error) {
        state.auth = null;
        localStorage.removeItem(STORAGE_KEYS.auth);
        renderLogin(error.message || "เข้าสู่ระบบใหม่อีกครั้ง");
        return new Promise((resolve) => {
          window.__loginResolved = resolve;
        });
      }
    }

    function renderLogin(message = "") {
      const root = document.getElementById("loginRoot");
      root.innerHTML = `
        <section class="login-screen">
          <div class="panel login-card">
            <div class="login-logo"><span class="material-symbols-outlined">apartment</span></div>
            <h1 class="page-title" style="font-size:2rem; margin:0 0 10px;">เข้าสู่ระบบ Easy Rent Bill</h1>
            <div class="subtle" style="margin-top:0; margin-bottom:20px;">
              ใช้ user และ password สำหรับเข้าถึงข้อมูลใน Google Sheets
            </div>
            ${message ? `<div class="danger-box" style="margin-bottom:16px;">${escapeHtml(message)}</div>` : ""}
            <form id="loginForm" class="form-grid">
              <label class="field">
                <span>ชื่อผู้ใช้</span>
                <input name="username" value="${escapeHtml(state.auth?.username || "admin")}" required>
              </label>
              <label class="field">
                <span>รหัสผ่าน</span>
                <input name="password" type="password" value="${escapeHtml(state.auth?.password || "admin1234")}" required>
              </label>
              <button class="btn btn-primary" type="submit">
                <span class="material-symbols-outlined">login</span>
                เข้าระบบ
              </button>
            </form>
            <div class="info-box" style="margin-top:16px;">
              ค่าเริ่มต้นในข้อมูลทดสอบ: <strong>admin / admin1234</strong>
            </div>
          </div>
        </section>
      `;

      document.getElementById("loginForm").onsubmit = async (event) => {
        event.preventDefault();
        const form = new FormData(event.currentTarget);
        const username = String(form.get("username") || "").trim();
        const password = String(form.get("password") || "").trim();
        try {
          await api("LOGIN", { username, password }, { anonymous: true });
          state.auth = { username, password };
          localStorage.setItem(STORAGE_KEYS.auth, JSON.stringify(state.auth));
          root.innerHTML = "";
          if (window.__loginResolved) {
            window.__loginResolved();
            window.__loginResolved = null;
          }
        } catch (error) {
          renderLogin(error.message || "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
        }
      };
    }

    async function loadPage(page, force = false) {
      state.page = page;
      renderShell();
      setLoading(true);
      try {
        if (page === "dashboard" || force) {
          await loadDashboard();
        }
        if (page === "rooms" || force) {
          await loadRooms();
        }
        if (page === "meters" || force) {
          await loadMeters();
        }
        if (page === "invoices" || force) {
          await loadInvoices();
        }
        if (page === "settings" || force) {
          await loadSettings();
        }
        renderPage();
      } catch (error) {
        showToast(error.message || "โหลดข้อมูลไม่สำเร็จ", "error");
        renderPage(error);
      } finally {
        setLoading(false);
      }
    }

    async function loadDashboard() {
      const [summary, logs, invoices] = await Promise.all([
        api("GET_DASHBOARD_SUMMARY", { month: state.invoices.month }),
        api("GET_LOGS", { limit: 10 }),
        api("GET_INVOICES", { month: state.invoices.month, status: "unpaid", page: 1, pageSize: 6 })
      ]);
      state.summary = summary;
      state.logs = logs.items || logs;
      state.dashboardInvoices = invoices.items || [];
    }

    async function loadRooms() {
      const rooms = await api("GET_ROOMS", {
        page: state.rooms.page,
        pageSize: state.rooms.pageSize,
        query: state.rooms.query,
        status: state.rooms.status
      });
      state.rooms = { ...state.rooms, ...rooms };
    }

    async function loadMeters() {
      const meterData = await api("GET_METER_PROGRESS", { billingMonth: state.meter.month });
      state.meter.rooms = meterData.rooms || [];
      state.meter.progress = {
        done: meterData.done || 0,
        total: meterData.total || 0,
        percent: meterData.percent || 0
      };
      if (!state.meter.roomId && state.meter.rooms[0]) {
        state.meter.roomId = state.meter.rooms[0].room_id;
      }
      if (state.meter.roomId) {
        state.meter.previous = await api("GET_PREVIOUS_METER", {
          billingMonth: state.meter.month,
          roomId: state.meter.roomId
        });
      }
    }

    async function loadInvoices() {
      const invoices = await api("GET_INVOICES", {
        month: state.invoices.month,
        status: state.invoices.status,
        query: state.invoices.query,
        page: state.invoices.page,
        pageSize: state.invoices.pageSize
      });
      state.invoices = { ...state.invoices, ...invoices };
    }

    async function loadSettings() {
      state.settings = await api("GET_SETTINGS");
    }

    function renderPage(error = null) {
      const root = document.getElementById("pageRoot");
      if (state.loading) {
        root.innerHTML = `
          <div class="panel panel-block">
            <div class="loader">กำลังโหลดข้อมูล...</div>
          </div>
        `;
        return;
      }
      if (error) {
        root.innerHTML = `
          <div class="panel panel-block">
            <div class="danger-box">${escapeHtml(error.message || "มีปัญหาในการโหลดข้อมูล")}</div>
          </div>
        `;
        return;
      }

      const renderers = {
        dashboard: renderDashboard,
        rooms: renderRooms,
        meters: renderMeters,
        invoices: renderInvoices,
        settings: renderSettings
      };
      root.innerHTML = renderers[state.page]();
    }

    function renderMeters() {

      const electricPrev = numberOrZero(prev.electric_prev);

      const electricCurrent = prev.electric_current ?? "";
      const waterUnits = Math.max(0, Number(waterCurrent || 0) - waterPrev);
      const electricUnits = Math.max(0, Number(electricCurrent || 0) - electricPrev);
      const waterRate = Number(prev.water_rate || state.settings.water_rate || 18);
      const electricRate = Number(prev.electric_rate || state.settings.electric_rate || 8);
      const waterAmount = waterUnits * waterRate;

    async function api(action, payload = {}, options = {}) {
      const settings = {
        anonymous: false,
        silent: false,
        ...options
      };

      try {
        if (isMockMode()) {
          return mockApi(action, payload, settings);
        }

        const response = await fetch(state.scriptUrl, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({
            action,
            payload,
            auth: settings.anonymous ? null : state.auth
          })
        });

        const json = await response.json();
        if (!json.success) {
          throw new Error(json.error || json.message || "เรียก API ไม่สำเร็จ");
        }
        return json.data;
      } catch (error) {
        if (!settings.silent) {
          console.error("API error", action, error);
        }
        throw error;
      }
    }

    function isMockMode() {
      return !state.scriptUrl || state.scriptUrl === APP_URL_PLACEHOLDER;
    }

    function mockApi(action, payload = {}, options = {}) {
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          try {
            if (!options.anonymous && action !== "PING" && action !== "INIT_DATABASE") {
              authenticateMock(state.auth);
            }

            const result = mockHandlers[action] ? mockHandlers[action](payload) : null;
            if (result === null || result === undefined) {
              throw new Error("ยังไม่มี action นี้ในโหมดตัวอย่าง: " + action);
            }
            resolve(deepClone(result));
          } catch (error) {
            reject(error);
          }
        }, 120);
      });
    }

    const mockHandlers = {
      LOGIN(payload) {
        const user = mockDb.settings.find((item) => item.key === "admin_user")?.value || "admin";
        const pass = mockDb.settings.find((item) => item.key === "admin_password")?.value || "admin1234";
        if (payload.username !== user || payload.password !== pass) {
          throw new Error("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
        }
        return { ok: true };
      },
      GET_SETTINGS() {
        return objectFromSettings(mockDb.settings);
      },
      SAVE_SETTINGS(payload) {
        upsertSettings(mockDb.settings, payload);
        return objectFromSettings(mockDb.settings);
      },
      INIT_DATABASE() {
        resetMockDatabase();
        return { message: "สร้างข้อมูลดัมมี่ใหม่แล้ว" };
      },
      PING() {
        return { status: "OK", mode: "mock" };
      },
      GET_DASHBOARD_SUMMARY() {
        return summarizeMock();
      },
      GET_LOGS(payload) {
        const limit = Number(payload.limit || 10);
        return { items: mockDb.logs.slice(0, limit) };
      },
      GET_ROOMS(payload) {
        const page = Number(payload.page || 1);
        const pageSize = Number(payload.pageSize || 20);
        const query = String(payload.query || "").trim().toLowerCase();
        const status = payload.status || "all";
        let items = mockDb.rooms.slice();
        if (query) {
          items = items.filter((room) => {
            return [room.room_no, room.tenant_name, room.phone].join(" ").toLowerCase().includes(query);
          });
        }
        if (status !== "all") {
          items = items.filter((room) => room.status === status);
        }
        items.sort((a, b) => String(a.room_no).localeCompare(String(b.room_no)));
        return paginate(items, page, pageSize);
      },
      GET_ROOM_DETAIL(payload) {
        const room = mockDb.rooms.find((item) => item.room_id === payload.roomId);
        if (!room) throw new Error("ไม่พบห้องพัก");
        return room;
      },
      CREATE_ROOM(payload) {
        const now = stamp();
        const room = {
          room_id: uid("R"),
          room_no: payload.room_no,
          floor: payload.floor,
          tenant_name: payload.tenant_name,
          phone: payload.phone,
          status: payload.status,
          base_rent: Number(payload.base_rent || 0),
          common_fee: Number(payload.common_fee || 0),
          parking_fee: Number(payload.parking_fee || 0),
          internet_fee: Number(payload.internet_fee || 0),
          other_fee: Number(payload.other_fee || 0),
          note: payload.note || "",
          created_at: now,
          updated_at: now
        };
        mockDb.rooms.unshift(room);
        syncMockTenant(room);
        pushMockLog("CREATE_ROOM", `เพิ่มห้อง ${room.room_no}`);
        return room;
      },
      UPDATE_ROOM(payload) {
        const room = mockDb.rooms.find((item) => item.room_id === payload.room_id);
        if (!room) throw new Error("ไม่พบห้องพัก");
        Object.assign(room, payload, { updated_at: stamp() });
        syncMockTenant(room);
        pushMockLog("UPDATE_ROOM", `อัปเดตห้อง ${room.room_no}`);
        return room;
      },
      DELETE_ROOM(payload) {
        const index = mockDb.rooms.findIndex((item) => item.room_id === payload.roomId);
        if (index < 0) throw new Error("ไม่พบห้องพัก");
        const [room] = mockDb.rooms.splice(index, 1);
        pushMockLog("DELETE_ROOM", `ลบห้อง ${room.room_no}`);
        return { ok: true };
      },
      GET_METER_PROGRESS(payload) {
        const month = payload.billingMonth || currentMonth();
        const rooms = mockDb.rooms.filter((room) => room.status !== "disabled");
        const done = rooms.filter((room) => mockDb.meters.some((meter) => meter.billing_month === month && meter.room_id === room.room_id)).length;
        return {
          total: rooms.length,
          done,
          percent: rooms.length ? Math.round(done / rooms.length * 100) : 0,
          rooms: rooms.map((room) => ({ room_id: room.room_id, room_no: room.room_no, status: room.status }))
        };
      },
      GET_PREVIOUS_METER(payload) {
        const room = mockDb.rooms.find((item) => item.room_id === payload.roomId);
        const records = mockDb.meters
          .filter((item) => item.room_id === payload.roomId)
          .sort((a, b) => String(b.billing_month).localeCompare(String(a.billing_month)));
        const existing = records.find((item) => item.billing_month === payload.billingMonth);
        const previous = records.find((item) => item.billing_month < payload.billingMonth) || {};
        return {
          room_id: payload.roomId,
          room_no: room?.room_no || "",
          billing_month: payload.billingMonth,
          water_prev: Number(existing?.water_prev ?? previous.water_current ?? 0),
          water_current: existing?.water_current ?? "",
          electric_prev: Number(existing?.electric_prev ?? previous.electric_current ?? 0),
          electric_current: existing?.electric_current ?? "",
          water_rate: existing?.water_rate ?? settingValue("water_rate", 18),
          electric_rate: existing?.electric_rate ?? settingValue("electric_rate", 8)
        };
      },
      SAVE_METER_READING(payload) {
        const data = buildMeterPayload(payload);
        const existing = mockDb.meters.find((item) => item.room_id === data.room_id && item.billing_month === data.billing_month);
        if (existing) {
          Object.assign(existing, data, { updated_at: stamp() });
        } else {
          mockDb.meters.unshift({
            meter_id: uid("M"),
            recorded_at: stamp(),
            updated_at: stamp(),
            note: payload.note || "",
            ...data
          });
        }
        pushMockLog("SAVE_METER_READING", `บันทึกมิเตอร์ห้อง ${data.room_no} เดือน ${data.billing_month}`);
        return { ok: true };
      },
      GET_METER_READINGS(payload) {
        const month = payload.billingMonth || currentMonth();
        return {
          items: mockDb.meters.filter((item) => item.billing_month === month)
        };
      },
      GENERATE_INVOICES(payload) {
        const month = payload.billingMonth || currentMonth();
        let count = 0;
        mockDb.rooms.filter((room) => room.status === "occupied").forEach((room) => {
          const meter = mockDb.meters.find((item) => item.room_id === room.room_id && item.billing_month === month) || {};
          const customAmount = mockDb.customCharges
            .filter((item) => item.room_id === room.room_id && item.billing_month === month && item.active === "TRUE")
            .reduce((sum, item) => sum + Number(item.amount || 0), 0);
          const invoice = buildInvoiceFromRoom(room, meter, month, customAmount);
          const existing = mockDb.invoices.find((item) => item.room_id === room.room_id && item.billing_month === month);
          if (existing) {
            Object.assign(existing, invoice, { updated_at: stamp() });
          } else {
            mockDb.invoices.unshift({
              invoice_id: uid("I"),
              created_at: stamp(),
              updated_at: stamp(),
              paid_at: "",
              paid_amount: 0,
              status: "unpaid",
              note: "",
              ...invoice
            });
          }
          count += 1;
        });
        pushMockLog("GENERATE_INVOICES", `ออกใบแจ้งหนี้เดือน ${month} จำนวน ${count} ห้อง`);
        return { created: count };
      },
      GET_INVOICES(payload) {
        const page = Number(payload.page || 1);
        const pageSize = Number(payload.pageSize || 20);
        const month = payload.month || "";
        const status = payload.status || "all";
        const query = String(payload.query || "").trim().toLowerCase();
        let items = mockDb.invoices.slice();
        if (month) items = items.filter((item) => item.billing_month === month);
        if (status !== "all") items = items.filter((item) => item.status === status);
        if (query) {
          items = items.filter((item) => [item.invoice_no, item.room_no, item.tenant_name].join(" ").toLowerCase().includes(query));
        }
        items.sort((a, b) => String(b.billing_month).localeCompare(String(a.billing_month)) || String(a.room_no).localeCompare(String(b.room_no)));
        return paginate(items, page, pageSize);
      },
      GET_INVOICE_DETAIL(payload) {
        const invoice = mockDb.invoices.find((item) => item.invoice_id === payload.invoiceId);
        if (!invoice) throw new Error("ไม่พบใบแจ้งหนี้");
        const payments = mockDb.payments.filter((item) => item.invoice_id === invoice.invoice_id).map(stripPaymentPayload);
        return { ...invoice, payments };
      },
      UPDATE_INVOICE_STATUS(payload) {
        const invoice = mockDb.invoices.find((item) => item.invoice_id === payload.invoice_id);
        if (!invoice) throw new Error("ไม่พบใบแจ้งหนี้");
        invoice.status = payload.status;
        invoice.updated_at = stamp();
        return invoice;
      },
      CANCEL_INVOICE(payload) {
        return mockHandlers.UPDATE_INVOICE_STATUS({ invoice_id: payload.invoice_id, status: "cancelled" });
      },
      SAVE_PAYMENT(payload) {
        const invoice = mockDb.invoices.find((item) => item.invoice_id === payload.invoice_id);
        if (!invoice) throw new Error("ไม่พบใบแจ้งหนี้");
        const payment = {
          payment_id: uid("P"),
          invoice_id: invoice.invoice_id,
          invoice_no: invoice.invoice_no,
          room_id: invoice.room_id,
          room_no: invoice.room_no,
          tenant_name: invoice.tenant_name,
          paid_amount: Number(payload.paid_amount || invoice.total_amount || 0),
          method: payload.method || "cash",
          slip_base64: payload.slip_base64 || "",
          slip_name: payload.slip_name || "",
          paid_at: payload.paid_at || stamp(),
          received_by: payload.received_by || state.auth?.username || "admin",
          note: payload.note || "",
          created_at: stamp()
        };
        mockDb.payments.unshift(payment);
        invoice.status = "paid";
        invoice.paid_amount = payment.paid_amount;
        invoice.paid_at = payment.paid_at;
        invoice.updated_at = stamp();
        pushMockLog("SAVE_PAYMENT", `รับชำระห้อง ${invoice.room_no} จำนวน ${money(payment.paid_amount)}`);
        return stripPaymentPayload(payment);
      },
      GET_PAYMENTS() {
        return {
          items: mockDb.payments.map(stripPaymentPayload)
        };
      },
      EXPORT_BACKUP_JSON() {
        return mockDb;
      },
      EXPORT_CSV(payload) {
        const month = payload.month || currentMonth();

    function updateMeterPreviewBlock(prefix, currentValue, previousValue, rate, invalidText) {
      const input = document.getElementById(prefix + "CurrentInput");
      const preview = document.getElementById(prefix + "Preview");
      if (!input || !preview) return;
      const hasValue = currentValue !== "";
      const current = Number(currentValue || 0);
      const invalid = hasValue && current < previousValue;
      const units = Math.max(0, current - previousValue);
      const total = units * Number(rate || 0);
      input.classList.toggle("invalid", invalid);
      preview.className = invalid ? "danger-box" : "success-box";
      preview.textContent = invalid
        ? invalidText
        : `หน่วยที่ใช้ ${numberText(units)} หน่วย | ยอดรวม ${money(total)}`;
    }

    async function saveMeter(nextRoom) {
      const prev = state.meter.previous || {};
      const room = state.meter.rooms.find((item) => item.room_id === state.meter.roomId);
      if (!room) {
        showToast("กรุณาเลือกห้อง", "error");
        return;
      }

      const waterCurrent = state.meter.mode === "electric"
        ? Number(prev.water_current !== "" && prev.water_current !== undefined ? prev.water_current : (prev.water_prev || 0))
        : Number(valueOf("waterCurrentInput") || prev.water_prev || 0);
      const electricCurrent = state.meter.mode === "water"
        ? Number(prev.electric_current !== "" && prev.electric_current !== undefined ? prev.electric_current : (prev.electric_prev || 0))
        : Number(valueOf("electricCurrentInput") || prev.electric_prev || 0);
      if (state.meter.mode !== "electric" && Number(waterCurrent) < Number(prev.water_prev || 0)) {
        showToast("เลขมิเตอร์น้ำต่ำกว่าครั้งก่อน", "error");
        return;
      }
      if (state.meter.mode !== "water" && Number(electricCurrent) < Number(prev.electric_prev || 0)) {
        showToast("เลขมิเตอร์ไฟต่ำกว่าครั้งก่อน", "error");
        return;
      }

      await api("SAVE_METER_READING", {
        billingMonth: state.meter.month,
        roomId: state.meter.roomId,
        roomNo: room.room_no,
        waterPrev: prev.water_prev || 0,
        waterCurrent: waterCurrent || 0,
        electricPrev: prev.electric_prev || 0,
        electricCurrent: electricCurrent || 0,
        waterRate: prev.water_rate || state.settings.water_rate || 18,
        electricRate: prev.electric_rate || state.settings.electric_rate || 8
      });

      showToast("บันทึกมิเตอร์เรียบร้อย", "success");
      await loadMeters();

      if (nextRoom) {
        const index = state.meter.rooms.findIndex((item) => item.room_id === state.meter.roomId);
        const next = state.meter.rooms[index + 1];
        if (next) {
          state.meter.roomId = next.room_id;
          state.meter.previous = await api("GET_PREVIOUS_METER", {
            billingMonth: state.meter.month,
            roomId: next.room_id
          });
        }
      }
      renderPage();
    }

    async function resizeImageToBase64(file, maxHeight) {
      const imageUrl = await fileToDataUrl(file);
      const img = await loadImage(imageUrl);
      const scale = Math.min(1, maxHeight / img.height);
      const canvas = document.createElement("canvas");
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      return {
        width: canvas.width,
        height: canvas.height,
        base64: canvas.toDataURL("image/jpeg", 0.86)
      };
    }

        showToast(error.message || "เชื่อมต่อไม่สำเร็จ", "error");
      }

    async function initDatabase() {
      if (!confirm("ต้องการสร้างตารางและข้อมูลดัมมี่ใหม่หรือไม่?")) return;
      await api("INIT_DATABASE", {}, { anonymous: true });
      showToast("สร้างตาราง/ข้อมูลทดสอบเรียบร้อย", "success");
      await Promise.all([loadSettings(), loadDashboard(), loadRooms(), loadMeters(), loadInvoices()]);
      renderPage();
    }

    async function exportInvoicesCsv() {
      const data = await api("EXPORT_CSV", { month: state.invoices.month });

    async function downloadBackupJson() {

    function openModal({ title, content }) {
      const root = document.getElementById("modalRoot");
      root.className = "modal-root active";
      root.innerHTML = `
        <div class="modal-backdrop" onclick="closeModal()"></div>
        <div class="modal-card">
          <div class="modal-head">
            <div>
              <h2 class="modal-title">${escapeHtml(title)}</h2>
            </div>
            <button class="close-btn" type="button" onclick="closeModal()">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
          ${content}
        </div>
      `;
    }

    function closeModal() {
      const root = document.getElementById("modalRoot");
      root.className = "modal-root";
      root.innerHTML = "";
    }

    function showToast(message, type = "info") {
      const root = document.getElementById("toastRoot");
      const id = "toast-" + Date.now();
      const el = document.createElement("div");
      el.className = `toast ${type}`;
      el.id = id;
      el.textContent = message;
      root.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    function currentMonth() {
      const date = new Date();
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
    }

    function stamp() {
      const now = new Date();
      const pad = (value) => String(value).padStart(2, "0");
      return `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    }

    function uid(prefix) {
      return prefix + Date.now() + Math.floor(Math.random() * 1000);
    }

    function roomStatusLabel(status) {
      return ({
        all: "ทั้งหมด",
        occupied: "มีผู้เช่า",
        vacant: "ว่าง",
        maintenance: "ปรับปรุง",
        disabled: "ปิดใช้งาน"
      })[status] || status;
    }

    function invoiceStatusLabel(status) {
      return ({
        all: "ทั้งหมด",
        unpaid: "ค้างชำระ",
        paid: "ชำระแล้ว",
        cancelled: "ยกเลิก"
      })[status] || status;
    }

    function formatThaiMonth(value) {
      if (!value) return "-";
      const [year, month] = value.split("-");
      const names = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
      return `${names[Number(month) - 1] || month} ${Number(year) + 543}`;
    }

    function money(value) {
      return Number(value || 0).toLocaleString("th-TH", {
        minimumFractionDigits: 0,
        maximumFractionDigits: 2
      }) + " บาท";
    }

    function numberText(value) {
      return Number(value || 0).toLocaleString("th-TH");
    }

    function numberOrZero(value) {
      return Number(value || 0);
    }

    function valueOf(id) {
      return document.getElementById(id)?.value?.trim() || "";
    }

    function readJson(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (error) {
        return fallback;
      }
    }

    function csvValue(value) {
      return `"${String(value ?? "").replaceAll('"', '""')}"`;
    }

    function deepClone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function logIcon(action) {
      if (action.includes("PAY")) return "payments";
      if (action.includes("INVOICE")) return "receipt_long";
      if (action.includes("METER")) return "speed";
      if (action.includes("ROOM")) return "home_work";
      return "history";
    }

    function downloadFile(filename, content, mime) {
      const blob = new Blob([content], { type: mime });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = filename;
      anchor.click();
      URL.revokeObjectURL(url);
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = src;
      });
    }

    function objectFromSettings(items) {
      return items.reduce((acc, item) => {
        acc[item.key] = item.value;
        return acc;
      }, {});
    }

    function settingValue(key, fallback) {
      return objectFromSettings(mockDb.settings)[key] || fallback;
    }

    function pushMockLog(action, detail) {
      mockDb.logs.unshift({
        log_id: uid("L"),
        action,
        ref_type: "",
        ref_id: "",
        detail,
        created_at: stamp(),
        user: state.auth?.username || "admin"
      });
      mockDb.logs = mockDb.logs.slice(0, 50);
    }

    function syncMockTenant(room) {
      const existing = mockDb.tenants.find((item) => item.room_id === room.room_id);
      const tenant = {
        tenant_id: existing?.tenant_id || uid("T"),
        room_id: room.room_id,
        name: room.tenant_name || "",
        phone: room.phone || "",
        start_date: existing?.start_date || currentMonth() + "-01",
        end_date: "",
        status: room.tenant_name ? "active" : "vacant",
        created_at: existing?.created_at || stamp(),
        updated_at: stamp()
      };
      if (existing) {
        Object.assign(existing, tenant);
      } else {
        mockDb.tenants.unshift(tenant);
      }
    }

    function upsertSettings(items, payload) {
      Object.entries(payload).forEach(([key, value]) => {
        const existing = items.find((item) => item.key === key);
        if (existing) {
          existing.value = String(value);
          existing.updated_at = stamp();
        } else {
          items.push({ key, value: String(value), note: "", updated_at: stamp() });
        }
      });
    }

    function summarizeMock() {
      const totalRooms = mockDb.rooms.length;
      const occupiedRooms = mockDb.rooms.filter((item) => item.status === "occupied").length;
      const vacantRooms = mockDb.rooms.filter((item) => item.status === "vacant").length;
      const maintenanceRooms = mockDb.rooms.filter((item) => item.status === "maintenance").length;
      const bills = mockDb.invoices.filter((item) => item.billing_month === state.invoices.month);
      const payments = mockDb.payments.filter((item) => item.paid_at.startsWith(state.invoices.month));
      return {
        total_rooms: totalRooms,
        occupied_rooms: occupiedRooms,
        vacant_rooms: vacantRooms,
        maintenance_rooms: maintenanceRooms,
        bills_this_month: bills.length,
        paid_bills: bills.filter((item) => item.status === "paid").length,
        unpaid_bills: bills.filter((item) => item.status === "unpaid").length,
        total_revenue: bills.reduce((sum, item) => sum + Number(item.total_amount || 0), 0),
        received_amount: payments.reduce((sum, item) => sum + Number(item.paid_amount || 0), 0),
        outstanding_amount: bills.filter((item) => item.status !== "paid").reduce((sum, item) => sum + Number(item.total_amount || 0), 0)
      };
    }

    function paginate(items, page, pageSize) {
      const total = items.length;
      const totalPages = Math.max(1, Math.ceil(total / pageSize));
      const currentPage = Math.min(Math.max(page, 1), totalPages);
      const start = (currentPage - 1) * pageSize;
      return {
        items: items.slice(start, start + pageSize),
        total,
        page: currentPage,
        pageSize,
        totalPages
      };
    }

    function buildMeterPayload(payload) {
      const waterPrev = Number(payload.waterPrev || 0);
      const waterCurrent = Number(payload.waterCurrent || 0);
      const electricPrev = Number(payload.electricPrev || 0);
      const electricCurrent = Number(payload.electricCurrent || 0);
      const waterRate = Number(payload.waterRate || settingValue("water_rate", 18));
      const electricRate = Number(payload.electricRate || settingValue("electric_rate", 8));
      return {
        billing_month: payload.billingMonth,
        room_id: payload.roomId,
        room_no: payload.roomNo,
        water_prev: waterPrev,
        water_current: waterCurrent,
        water_unit: Math.max(0, waterCurrent - waterPrev),
        water_rate: waterRate,
        water_amount: Math.max(0, waterCurrent - waterPrev) * waterRate,
        electric_prev: electricPrev,
        electric_current: electricCurrent,
        electric_unit: Math.max(0, electricCurrent - electricPrev),
        electric_rate: electricRate,
        electric_amount: Math.max(0, electricCurrent - electricPrev) * electricRate
      };
    }

    function buildInvoiceFromRoom(room, meter, month, customAmount) {
      const rentAmount = Number(room.base_rent || 0);
      const commonFee = Number(room.common_fee || 0);
      const parkingFee = Number(room.parking_fee || 0);
      const internetFee = Number(room.internet_fee || 0);
      const otherFee = Number(room.other_fee || 0);
      const waterAmount = Number(meter.water_amount || 0);
      const electricAmount = Number(meter.electric_amount || 0);
      return {
        invoice_no: `INV-${month.replace("-", "")}-${room.room_no}`,
        billing_month: month,
        room_id: room.room_id,
        room_no: room.room_no,
        tenant_id: room.room_id,
        tenant_name: room.tenant_name || "",
        rent_amount: rentAmount,
        common_fee: commonFee,
        parking_fee: parkingFee,
        internet_fee: internetFee,
        other_fee: otherFee,
        water_amount: waterAmount,
        electric_amount: electricAmount,
        custom_amount: Number(customAmount || 0),
        total_amount: rentAmount + commonFee + parkingFee + internetFee + otherFee + waterAmount + electricAmount + Number(customAmount || 0)
      };
    }

    function stripPaymentPayload(payment) {
      const clone = { ...payment };
      delete clone.slip_base64;
      return clone;
    }

      return deepClone(buildInitialMockData());
    }

      const fresh = buildInitialMockData();
      Object.keys(mockDb).forEach((key) => delete mockDb[key]);
